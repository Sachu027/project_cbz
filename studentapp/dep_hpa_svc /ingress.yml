apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studentapp-ingress
spec:
  rules:
  - http:
      paths:
      - path: /nginx
        pathType: Prefix
        backend:
          service:
            name: npci
            port:
              number: 80
      - path: /tomcat
        pathType: Prefix
        backend:
          service:
            name: tcci
            port:
              number: 8080
